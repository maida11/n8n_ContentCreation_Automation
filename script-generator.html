<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Script Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0A0A0F;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border-active: rgba(255,255,255,0.18);
    --ink: #F0EEF8;
    --ink-soft: rgba(240,238,248,0.5);
    --ink-muted: rgba(240,238,248,0.3);
    --accent: #A259FF;
    --accent2: #FF6B6B;
    --accent3: #00E5FF;
    --glow: rgba(162,89,255,0.3);
    --glow2: rgba(255,107,107,0.2);
    --success: #00E676;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE + GRID BACKGROUND ────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(162,89,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(162,89,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── AMBIENT ORBS ───────────────────────────────────── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #A259FF, transparent 70%);
    top: -150px; left: -100px;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #FF6B6B, transparent 70%);
    bottom: -100px; right: -80px;
    animation: drift 15s ease-in-out infinite alternate-reverse;
  }
  .orb-3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #00E5FF, transparent 70%);
    top: 40%; right: 10%;
    opacity: 0.15;
    animation: drift 18s ease-in-out infinite alternate;
  }
  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, -20px) scale(1.08); }
  }

  /* ── LAYOUT ─────────────────────────────────────────── */
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 72px 24px 100px;
  }

  /* ── HEADER ─────────────────────────────────────────── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(162,89,255,0.12);
    border: 1px solid rgba(162,89,255,0.3);
    border-radius: 100px;
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #C084FC;
    margin-bottom: 28px;
  }
  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #A259FF;
    box-shadow: 0 0 8px #A259FF;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(36px, 6vw, 58px);
    line-height: 1.0;
    letter-spacing: -0.03em;
    margin-bottom: 18px;
  }

  .h1-line1 { color: var(--ink); }
  .h1-line2 {
    background: linear-gradient(90deg, #A259FF, #FF6B6B, #00E5FF);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite;
  }
  @keyframes shimmer {
    0%   { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  .sub {
    color: var(--ink-soft);
    font-size: 16px;
    line-height: 1.6;
    max-width: 460px;
    margin-bottom: 44px;
  }

  /* ── FORM CARD ──────────────────────────────────────── */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .form-card:focus-within {
    border-color: rgba(162,89,255,0.4);
    box-shadow: 0 0 0 1px rgba(162,89,255,0.15), 0 8px 40px rgba(162,89,255,0.1);
  }
  .form-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(162,89,255,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 10px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    position: relative;
  }

  input[type="url"] {
    flex: 1;
    padding: 15px 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border-active);
    border-radius: 12px;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    outline: none;
    transition: all 0.2s ease;
  }
  input[type="url"]:focus {
    border-color: rgba(162,89,255,0.6);
    background: rgba(162,89,255,0.06);
    box-shadow: 0 0 0 3px rgba(162,89,255,0.1);
  }
  input[type="url"]::placeholder { color: rgba(240,238,248,0.2); }

  button[type="submit"] {
    background: linear-gradient(135deg, #A259FF, #7C3AED);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px 24px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(162,89,255,0.4);
  }
  button[type="submit"]::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    pointer-events: none;
  }
  button[type="submit"]:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(162,89,255,0.55);
  }
  button[type="submit"]:active { transform: translateY(0) scale(0.99); }
  button[type="submit"]:disabled {
    background: rgba(255,255,255,0.08);
    color: var(--ink-muted);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  .hint {
    font-size: 12px;
    color: var(--ink-muted);
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .hint::before {
    content: '⚡';
    font-size: 11px;
  }

  /* ── STATUS ─────────────────────────────────────────── */
  #status { margin-top: 20px; }

  .loading-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 22px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--ink-soft);
    font-size: 14px;
    backdrop-filter: blur(10px);
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(162,89,255,0.3);
    border-top-color: #A259FF;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
    box-shadow: 0 0 12px rgba(162,89,255,0.4);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-card {
    padding: 18px 22px;
    background: rgba(255,107,107,0.08);
    border: 1px solid rgba(255,107,107,0.25);
    border-radius: 14px;
    color: #FF9999;
    font-size: 14px;
    line-height: 1.55;
  }
  .error-card strong {
    display: block;
    margin-bottom: 4px;
    color: #FF6B6B;
    font-size: 15px;
  }

  /* ── RESULT ─────────────────────────────────────────── */
  #result { margin-top: 40px; display: none; }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    gap: 16px;
  }

  .result-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.01em;
  }

  .copy-btn {
    background: var(--surface);
    border: 1px solid var(--border-active);
    color: var(--ink-soft);
    border-radius: 10px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: all 0.18s ease;
    white-space: nowrap;
    backdrop-filter: blur(10px);
  }
  .copy-btn:hover {
    border-color: rgba(162,89,255,0.5);
    color: var(--ink);
    background: rgba(162,89,255,0.1);
  }
  .copy-btn.copied {
    border-color: rgba(0,230,118,0.4);
    color: var(--success);
    background: rgba(0,230,118,0.08);
  }

  /* ── AUDIO ──────────────────────────────────────────── */
  .audio-card {
    background: linear-gradient(135deg, rgba(162,89,255,0.08), rgba(0,229,255,0.04));
    border: 1px solid rgba(162,89,255,0.2);
    border-radius: 16px;
    padding: 18px 22px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .audio-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #C084FC;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .audio-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(162,89,255,0.2);
  }
  audio {
    width: 100%;
    accent-color: #A259FF;
  }

  /* ── TABS ───────────────────────────────────────────── */
  .tab-bar {
    display: flex;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 5px;
    margin-bottom: 20px;
    backdrop-filter: blur(10px);
  }

  .tab-btn {
    flex: 1;
    background: transparent;
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--ink); background: rgba(255,255,255,0.05); }
  .tab-btn.active {
    background: linear-gradient(135deg, rgba(162,89,255,0.25), rgba(162,89,255,0.12));
    color: #C084FC;
    box-shadow: inset 0 0 0 1px rgba(162,89,255,0.3);
  }

  .tab-panel { display: none; animation: fadeUp 0.22s ease; }
  .tab-panel.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SCRIPT ─────────────────────────────────────────── */
  .script-content {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .script-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 22px;
    transition: border-color 0.2s ease, background 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .script-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: linear-gradient(180deg, #A259FF, #FF6B6B);
    border-radius: 3px 0 0 3px;
  }
  .script-section:hover {
    border-color: var(--border-active);
    background: var(--surface-hover);
  }

  .shot-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .shot-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: #A259FF;
    background: rgba(162,89,255,0.12);
    border: 1px solid rgba(162,89,255,0.2);
    border-radius: 6px;
    padding: 2px 8px;
    letter-spacing: 0.05em;
  }
  .shot-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .script-text {
    font-size: 15px;
    line-height: 1.75;
    color: var(--ink);
    white-space: pre-wrap;
  }

  /* ── HASHTAGS ───────────────────────────────────────── */
  .hashtag-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .hashtag {
    background: rgba(255,255,255,0.05);
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s ease;
    border: 1px solid var(--border-active);
    user-select: none;
  }
  .hashtag:hover {
    background: rgba(162,89,255,0.15);
    border-color: rgba(162,89,255,0.4);
    color: #C084FC;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(162,89,255,0.2);
  }
  .hashtag.copied {
    background: rgba(0,230,118,0.1);
    border-color: rgba(0,230,118,0.3);
    color: var(--success);
  }

  /* ── HOOKS ──────────────────────────────────────────── */
  .hook-list { display: flex; flex-direction: column; gap: 8px; }

  .hook-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    cursor: pointer;
    transition: all 0.18s ease;
    position: relative;
    overflow: hidden;
  }
  .hook-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(162,89,255,0.04), transparent);
    opacity: 0;
    transition: opacity 0.18s ease;
    pointer-events: none;
  }
  .hook-card:hover {
    border-color: rgba(162,89,255,0.3);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(162,89,255,0.1);
  }
  .hook-card:hover::after { opacity: 1; }
  .hook-card.copied {
    border-color: rgba(0,230,118,0.3);
    background: rgba(0,230,118,0.04);
  }

  .hook-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #A259FF;
    background: rgba(162,89,255,0.12);
    border: 1px solid rgba(162,89,255,0.2);
    border-radius: 6px;
    padding: 2px 8px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .hook-text {
    font-size: 15px;
    line-height: 1.65;
    color: var(--ink);
    flex: 1;
  }

  .copy-hint {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink-muted);
    opacity: 0;
    transition: opacity 0.15s ease;
    flex-shrink: 0;
    padding-top: 4px;
    letter-spacing: 0.05em;
  }
  .hook-card:hover .copy-hint { opacity: 1; }
  .hook-card.copied .copy-hint { opacity: 1; color: var(--success); }

  .panel-hint {
    font-size: 12px;
    color: var(--ink-muted);
    margin-top: 14px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--ink-muted);
    font-size: 14px;
  }

  /* ── SCROLLBAR ──────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(162,89,255,0.3); border-radius: 4px; }

  /* ── RESPONSIVE ─────────────────────────────────────── */
  @media (max-width: 540px) {
    .input-row { flex-direction: column; }
    .tab-btn .tab-label { display: none; }
    .wrap { padding: 48px 16px 80px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .orb, .spinner { animation: none; }
    .tab-panel { animation: none; }
    .h1-line2 { animation: none; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="wrap">
  <div class="badge">
    <span class="badge-dot"></span>
    Script generator
  </div>

  <h1>
    <div class="h1-line1">Product page →</div>
    <div class="h1-line2">TikTok script.</div>
  </h1>

  <p class="sub">Paste any product URL. We'll scrape it and return a ready-to-shoot script, voiceover, hashtags, and hooks in under 20 seconds.</p>

  <div class="form-card">
    <label for="url">Product or store URL</label>
    <div class="input-row">
      <input type="url" id="url" placeholder="https://yourstore.com/product" required />
      <button type="submit" id="submitBtn" onclick="handleSubmit(event)">Generate ✦</button>
    </div>
    <p class="hint">Takes 10–20 seconds — enough time to grab a coffee.</p>
  </div>

  <div id="status"></div>
  <div id="result"></div>
</div>

<script>
const WEBHOOK_URL = 'your production url here';

const statusEl  = document.getElementById('status');
const resultEl  = document.getElementById('result');
const submitBtn = document.getElementById('submitBtn');

let parsed = { script: [], hashtags: [], hooks: [], audioUrl: null };

async function handleSubmit(e) {
  e.preventDefault();
  const url = document.getElementById('url').value.trim();
  if (!url) return;

  resultEl.style.display = 'none';
  resultEl.innerHTML = '';
  submitBtn.disabled = true;
  submitBtn.textContent = 'Generating…';
  statusEl.innerHTML = `
    <div class="loading-card">
      <div class="spinner"></div>
      <span>Scraping the page and writing your script…</span>
    </div>`;

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    if (!res.ok) throw new Error('Workflow responded with status ' + res.status);

    const data = await res.json();

    const obj = extractData(data);
    if (!obj) throw new Error('No data found in the response.');
    if (obj.error) throw new Error('The workflow could not produce a valid script for this page. Try again or try a different URL.');

    parsed = {
      script: Array.isArray(obj.script) ? obj.script : [],
      hashtags: Array.isArray(obj.hashtags) ? obj.hashtags : [],
      hooks: Array.isArray(obj.hooks) ? obj.hooks : [],
      audioUrl: obj.audioUrl || null
    };

    if (!parsed.script.length) throw new Error('No script found in the response.');

    renderResult();
    statusEl.innerHTML = '';
  } catch (err) {
    statusEl.innerHTML = `
      <div class="error-card">
        <strong>Couldn't generate a script</strong>
        ${esc(err.message)}. Check your webhook URL is correct and the workflow is active.
      </div>`;
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Generate ✦';
  }
}

function extractData(data) {
  const arr = Array.isArray(data) ? data : [data];
  const audioObj = arr.find(item => item.audioUrl);
  const contentObj = arr.find(item => item.script || item.hashtags || item.hooks);
  if (!contentObj) return null;
  const obj = (contentObj.json && contentObj.json.script) ? contentObj.json : contentObj;
  if (audioObj) obj.audioUrl = audioObj.audioUrl;
  return obj;
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str == null ? '' : String(str);
  return d.innerHTML;
}

function buildPlainText() {
  const scriptText = parsed.script
    .map(s => `Shot ${s.shot}: ${s.label || ''}\n${s.text || ''}`)
    .join('\n\n');
  const hashtagText = parsed.hashtags.join(' ');
  const hookText = parsed.hooks.map((h, i) => `${i + 1}. ${h}`).join('\n');
  return [scriptText, hashtagText || null, hookText ? `Hooks:\n${hookText}` : null]
    .filter(Boolean).join('\n\n');
}

function renderResult() {
  const hCount = parsed.hashtags.length ? ` (${parsed.hashtags.length})` : '';
  const kCount = parsed.hooks.length    ? ` (${parsed.hooks.length})`    : '';

  const audioHTML = parsed.audioUrl ? `
    <div class="audio-card">
      <span class="audio-label">🔊 Voiceover</span>
      <audio controls src="${parsed.audioUrl}"></audio>
    </div>` : '';

  resultEl.innerHTML = `
    <div class="result-header">
      <div class="result-title">Your content ✦</div>
      <button class="copy-btn" id="copyAllBtn">⧉ <span id="copyLabel">Copy all</span></button>
    </div>

    ${audioHTML}

    <div class="tab-bar" role="tablist">
      <button class="tab-btn active" data-tab="script" role="tab" aria-selected="true">
        📝 <span class="tab-label">Script</span>
      </button>
      <button class="tab-btn" data-tab="hashtags" role="tab" aria-selected="false">
        # <span class="tab-label">Hashtags${hCount}</span>
      </button>
      <button class="tab-btn" data-tab="hooks" role="tab" aria-selected="false">
        🎣 <span class="tab-label">Hooks${kCount}</span>
      </button>
    </div>

    <div id="tab-script"   class="tab-panel active">${buildScript()}</div>
    <div id="tab-hashtags" class="tab-panel">${buildHashtags()}</div>
    <div id="tab-hooks"    class="tab-panel">${buildHooks()}</div>
  `;

  resultEl.style.display = 'block';

  resultEl.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      resultEl.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b === btn);
        b.setAttribute('aria-selected', String(b === btn));
      });
      resultEl.querySelectorAll('.tab-panel').forEach(p => {
        p.classList.toggle('active', p.id === 'tab-' + btn.dataset.tab);
      });
    });
  });

  document.getElementById('copyAllBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(buildPlainText()).then(() => {
      const btn = document.getElementById('copyAllBtn');
      const lbl = document.getElementById('copyLabel');
      btn.classList.add('copied');
      lbl.textContent = 'Copied!';
      setTimeout(() => { btn.classList.remove('copied'); lbl.textContent = 'Copy all'; }, 1800);
    });
  });

  resultEl.querySelectorAll('.hashtag').forEach(el => {
    el.addEventListener('click', () => {
      navigator.clipboard.writeText(el.dataset.tag).then(() => {
        const orig = el.textContent;
        el.classList.add('copied');
        el.textContent = '✓ ' + orig;
        setTimeout(() => { el.classList.remove('copied'); el.textContent = orig; }, 1200);
      });
    });
  });

  resultEl.querySelectorAll('.hook-card').forEach(card => {
    card.addEventListener('click', () => {
      navigator.clipboard.writeText(card.dataset.hook).then(() => {
        card.classList.add('copied');
        card.querySelector('.copy-hint').textContent = '✓ copied';
        setTimeout(() => {
          card.classList.remove('copied');
          card.querySelector('.copy-hint').textContent = 'click to copy';
        }, 1400);
      });
    });
  });
}

function buildScript() {
  if (!parsed.script.length)
    return `<div class="empty-state">No script found in the response.</div>`;

  const inner = parsed.script.map(s => `
    <div class="script-section">
      <div class="shot-header">
        <span class="shot-num">SHOT ${String(s.shot ?? '').padStart(2, '0')}</span>
        <span class="shot-label">${esc(s.label)}</span>
      </div>
      <p class="script-text">${esc(s.text)}</p>
    </div>`).join('');

  return `<div class="script-content">${inner}</div>`;
}

function buildHashtags() {
  if (!parsed.hashtags.length)
    return `<div class="empty-state">No hashtags found in the response.</div>`;

  const pills = parsed.hashtags.map(t =>
    `<span class="hashtag" data-tag="${esc(t)}">${esc(t)}</span>`
  ).join('');

  return `
    <div class="hashtag-grid">${pills}</div>
    <p class="panel-hint">→ click any tag to copy</p>`;
}

function buildHooks() {
  if (!parsed.hooks.length)
    return `<div class="empty-state">No hooks found in the response.</div>`;

  const cards = parsed.hooks.map((h, i) => `
    <div class="hook-card" data-hook="${esc(h)}">
      <div class="hook-num">${String(i + 1).padStart(2, '0')}</div>
      <p class="hook-text">${esc(h)}</p>
      <span class="copy-hint">click to copy</span>
    </div>`).join('');

  return `
    <div class="hook-list">${cards}</div>
    <p class="panel-hint">→ click any hook to copy</p>`;
}
</script>
</body>
</html>
